<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Image Bank — LoopWorker</title>
<meta name="description" content="A living archive of generated image work — brand worlds, editorial campaigns, character development.">
<meta property="og:title" content="LoopWorker — Image Bank">
<meta property="og:description" content="872 generated images across Midjourney brand worlds, AI character work, and editorial campaigns.">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0b; --fg: #f2f2f2; --muted: #8a8a8f; --accent: #e8a652;
    --card: #131316; --border: #26262a; --hairline: #1c1c20;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; }
  body { font-family: "Inter", system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--fg); line-height: 1.5; -webkit-font-smoothing: antialiased; }

  .hero { padding: 80px 40px 50px; max-width: 1400px; margin: 0 auto; border-bottom: 1px solid var(--hairline); }
  .eyebrow { font-size: 11px; letter-spacing: .24em; text-transform: uppercase; color: var(--muted); margin-bottom: 18px; font-weight: 500; }
  .hero h1 { font-family: "Instrument Serif", serif; font-size: clamp(40px, 6vw, 76px); font-style: italic; font-weight: 400; margin: 0 0 20px; letter-spacing: -.02em; line-height: 1.02; }
  .hero h1 em { color: var(--accent); font-style: italic; }
  .hero p { font-size: 17px; color: var(--muted); max-width: 640px; margin: 0 0 40px; line-height: 1.55; }
  .stats { display: flex; gap: 48px; flex-wrap: wrap; padding-top: 24px; border-top: 1px solid var(--hairline); }
  .stat .num { font-family: "Instrument Serif", serif; font-size: 42px; font-style: italic; color: var(--fg); line-height: 1; display: block; }
  .stat .lab { font-size: 11px; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); margin-top: 6px; display: block; }

  .controls { position: sticky; top: 0; background: rgba(10,10,11,.94); -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px); padding: 18px 40px; border-bottom: 1px solid var(--border); z-index: 20; }
  .filters { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; max-width: 1400px; margin: 0 auto; }
  button { background: transparent; color: var(--muted); border: 1px solid var(--border); padding: 8px 14px; font-size: 11px; border-radius: 999px; cursor: pointer; letter-spacing: .1em; text-transform: uppercase; font-family: inherit; font-weight: 500; transition: all .15s; }
  button:hover { border-color: var(--muted); color: var(--fg); }
  button.active { background: var(--fg); color: #000; border-color: var(--fg); }
  button .c { opacity: .55; margin-left: 4px; }
  button.active .c { opacity: .65; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 4px; padding: 4px; max-width: 1400px; margin: 0 auto; }
  .tile { position: relative; background: var(--card); overflow: hidden; cursor: zoom-in; aspect-ratio: 1 / 1; }
  .tile img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .4s ease, opacity .3s; opacity: 0; }
  .tile img.loaded { opacity: 1; }
  .tile:hover img { transform: scale(1.05); }
  .tile .tag { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,.7); color: #fff; font-size: 9px; padding: 3px 8px; border-radius: 999px; text-transform: uppercase; letter-spacing: .12em; font-weight: 500; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }

  .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,.97); display: none; align-items: center; justify-content: center; z-index: 100; cursor: zoom-out; padding: 40px; }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .lightbox .meta { position: absolute; bottom: 20px; left: 20px; color: var(--muted); font-size: 11px; font-family: "SF Mono", monospace; background: rgba(0,0,0,.7); padding: 8px 14px; border-radius: 6px; letter-spacing: .04em; }
  .lightbox .close { position: absolute; top: 20px; right: 20px; color: var(--muted); font-size: 24px; cursor: pointer; background: rgba(0,0,0,.5); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

  .loader { padding: 60px; text-align: center; color: var(--muted); font-size: 12px; letter-spacing: .2em; text-transform: uppercase; }
  footer { padding: 60px 40px; text-align: center; color: var(--muted); font-size: 12px; border-top: 1px solid var(--hairline); margin-top: 60px; }
  footer a { color: var(--fg); text-decoration: none; border-bottom: 1px solid var(--accent); }

  @media (max-width: 700px) {
    .hero { padding: 48px 20px 32px; }
    .controls { padding: 14px 16px; }
    .grid { grid-template-columns: repeat(2, 1fr); }
    .stats { gap: 28px; }
    .stat .num { font-size: 32px; }
  }
</style>
</head>
<body>

<section class="hero">
  <div class="eyebrow">LoopWorker · Archive · 2026</div>
  <h1>A living archive of <em>generated image work</em>.</h1>
  <p>Brand worlds, character development, editorial campaigns — produced across Midjourney, NanoBanana, and ChatGPT. Every frame engineered to not look AI.</p>
  <div class="stats" id="stats"></div>
</section>

<div class="controls">
  <div class="filters" id="filters"></div>
</div>

<div class="loader" id="loader">Loading archive…</div>
<div class="grid" id="grid"></div>

<footer>
  Built by LoopWorker · <a href="mailto:lambsbrown@gmail.com">lambsbrown@gmail.com</a>
</footer>

<div class="lightbox" id="lightbox">
  <div class="close">×</div>
  <img id="lbimg">
  <div class="meta" id="lbmeta"></div>
</div>

<script>
const SOURCES = [
  { key: 'all',   label: 'All' },
  { key: 'mj',    label: 'Midjourney' },
  { key: 'altai', label: 'Altai Wool' },
  { key: 'aces',  label: 'Aces Tennis' },
  { key: 'remi',  label: 'Remi' },
  { key: 'crow',  label: 'Crows' },
];
const ORDER = ['mj', 'altai', 'aces', 'remi', 'crow'];
let DATA = [];
let ACTIVE = 'all';

async function boot() {
  const res = await fetch('manifest.json', { cache: 'no-store' });
  DATA = await res.json();
  DATA.sort((a, b) => ORDER.indexOf(a.source) - ORDER.indexOf(b.source));
  document.getElementById('loader').remove();
  renderStats();
  renderFilters();
  renderGrid();
}

function renderStats() {
  const host = document.getElementById('stats');
  const brandCount = new Set(DATA.map(d => d.source)).size;
  host.innerHTML = `
    <div class="stat"><span class="num">${DATA.length}</span><span class="lab">Images</span></div>
    <div class="stat"><span class="num">${brandCount}</span><span class="lab">Collections</span></div>
    <div class="stat"><span class="num">3</span><span class="lab">Engines</span></div>
    <div class="stat"><span class="num">1</span><span class="lab">Studio</span></div>
  `;
}

function renderFilters() {
  const host = document.getElementById('filters');
  host.innerHTML = '';
  for (const s of SOURCES) {
    const count = s.key === 'all' ? DATA.length : DATA.filter(d => d.source === s.key).length;
    if (count === 0 && s.key !== 'all') continue;
    const b = document.createElement('button');
    b.innerHTML = `${s.label}<span class="c">${count}</span>`;
    b.dataset.key = s.key;
    if (s.key === ACTIVE) b.classList.add('active');
    b.onclick = () => { ACTIVE = s.key; renderFilters(); renderGrid(); };
    host.appendChild(b);
  }
}

function renderGrid() {
  const g = document.getElementById('grid');
  g.innerHTML = '';
  const list = ACTIVE === 'all' ? DATA : DATA.filter(d => d.source === ACTIVE);
  for (const d of list) {
    const div = document.createElement('div');
    div.className = 'tile';
    const label = SOURCES.find(s => s.key === d.source)?.label || d.source;
    div.innerHTML = `<span class="tag">${label}</span><img loading="lazy" src="${d.thumb}" alt="${label}" onload="this.classList.add('loaded')">`;
    div.onclick = () => openLightbox(d);
    g.appendChild(div);
  }
}

function openLightbox(d) {
  const lb = document.getElementById('lightbox');
  const label = SOURCES.find(s => s.key === d.source)?.label || d.source;
  document.getElementById('lbimg').src = d.web;
  document.getElementById('lbmeta').textContent = `${label}`;
  lb.classList.add('open');
}
document.getElementById('lightbox').onclick = () => {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lbimg').src = '';
};
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('lightbox').click();
});

boot();
</script>
</body>
</html>
